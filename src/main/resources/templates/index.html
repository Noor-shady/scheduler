<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage and view your upcoming appointments.">

    <title>Appointment Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4" aria-label="Main navigation">
        <div class="container">
            <a class="navbar-brand" href="/">📅 Scheduler System</a>
            <div class="d-flex">
                <a href="/booking" class="btn btn-light text-primary fw-bold">Book New Appointment</a>
            </div>
        </div>
    </nav>
</header>

<main class="container">

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <strong>Success!</strong> Your appointment has been booked and a confirmation email has been sent.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div id='calendar'></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
