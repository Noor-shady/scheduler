# ==========================================
# Application Configuration
# ==========================================
spring.application.name=SchedulerSystem
# Set the server port
server.port=${PORT:8080}

# ==========================================
# Database Configuration
# ==========================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:schedulerdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Explicitly define how Hibernate handles the schema
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in the console for easier debugging
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable cache for local development so HTML updates instantly
spring.thymeleaf.cache=false

# ==========================================
# Email Configuration
# ==========================================
# Notice how I use ${VARIABLE_NAME:default_value} syntax.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true